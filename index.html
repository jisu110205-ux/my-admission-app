<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>나의 가상 합격증 만들기</title>
</head>
<body>
    <h1>🎉 나의 가상 합격증 만들기</h1>
    <form action="https://my-admission-app.onrender.com/send" method="POST">
        <p>이름: <input type="text" name="name" required></p>
        <p>목표 대학: <input type="text" name="university" required></p>
        <p>받을 이메일: <input type="email" name="email" required></p>
        <button type="submit">합격증 받기!</button>
    </form>
</body>
</html>
